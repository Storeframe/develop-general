# =============================================================================
# WooCommerce → Magento 2 URL Redirect Map (POC Sample)
# Generated: 2026-04-07
# =============================================================================
#
# ARCHITECTURE NOTES:
# - WC uses path-based language prefixes: /en/, /de/, /es/ (NL is default, no prefix)
# - M2 uses host-based store switching via Lua router (no URL language prefix)
# - M2 product URLs have NO .html suffix (catalog/seo/product_url_suffix is default empty)
# - M2 category URLs have NO .html suffix
# - M2 has some legacy "winkel/" prefixed URLs (store_id=1) alongside clean URLs
# - WC product pattern: /product/{slug}/
# - WC category pattern: /product-categorie/{slug}/
# - M2 product pattern: /{slug}
# - M2 category pattern: /{slug}
#
# ISSUE: WC WPML slugs are IDENTICAL across all languages for these 10 products.
# This means /en/product/flexo-pet/ and /de/product/flexo-pet/ both exist.
# M2 also uses the same slug across stores (host-based switching).
# Redirect target is the same slug — the M2 Lua router picks the store by hostname.
#
# ISSUE: M2 category slugs for DE/ES stores are still in Dutch (not translated).
# E.g., store_id=3 (Deutsch) still has "algemeen" instead of "universeller-einsatz".
# This needs to be fixed in M2 before go-live.
#
# ISSUE: M2 has "metaal-amp-afscherming" (HTML entity encoding) vs WC "metaal-afscherming".
# =============================================================================

# --- PRODUCT REDIRECTS (10 products × 4 languages = 40 rules) ---

map $request_uri $wc_product_redirect {
    default "";

    # SKU: PTN - Flexo PET
    ~^/product/flexo-pet/?$                     /flexo-pet;
    ~^/en/product/flexo-pet/?$                  /flexo-pet;
    ~^/de/product/flexo-pet/?$                  /flexo-pet;
    ~^/es/product/flexo-pet/?$                  /flexo-pet;

    # SKU: PTT - Flexo Tight Weave
    ~^/product/flexo-tight-weave/?$             /flexo-tight-weave;
    ~^/en/product/flexo-tight-weave/?$          /flexo-tight-weave;
    ~^/de/product/flexo-tight-weave/?$          /flexo-tight-weave;
    ~^/es/product/flexo-tight-weave/?$          /flexo-tight-weave;

    # SKU: PTO - Flexo Overexpanded
    ~^/product/flexo-overexpanded/?$            /flexo-overexpanded;
    ~^/en/product/flexo-overexpanded/?$         /flexo-overexpanded;
    ~^/de/product/flexo-overexpanded/?$         /flexo-overexpanded;
    ~^/es/product/flexo-overexpanded/?$         /flexo-overexpanded;

    # SKU: PTM - Flexo Remix
    ~^/product/flexo-remix/?$                   /flexo-remix;
    ~^/en/product/flexo-remix/?$                /flexo-remix;
    ~^/de/product/flexo-remix/?$                /flexo-remix;
    ~^/es/product/flexo-remix/?$                /flexo-remix;

    # SKU: CCP - Flexo Clean Cut
    ~^/product/flexo-clean-cut/?$               /flexo-clean-cut;
    ~^/en/product/flexo-clean-cut/?$            /flexo-clean-cut;
    ~^/de/product/flexo-clean-cut/?$            /flexo-clean-cut;
    ~^/es/product/flexo-clean-cut/?$            /flexo-clean-cut;

    # SKU: F6N - Flexo F6
    ~^/product/flexo-f6/?$                      /flexo-f6;
    ~^/en/product/flexo-f6/?$                   /flexo-f6;
    ~^/de/product/flexo-f6/?$                   /flexo-f6;
    ~^/es/product/flexo-f6/?$                   /flexo-f6;

    # SKU: F360 - F360
    ~^/product/f360/?$                          /f360;
    ~^/en/product/f360/?$                       /f360;
    ~^/de/product/f360/?$                       /f360;
    ~^/es/product/f360/?$                       /f360;

    # SKU: FWN - Flexo Wrap
    ~^/product/flexo-wrap/?$                    /flexo-wrap;
    ~^/en/product/flexo-wrap/?$                 /flexo-wrap;
    ~^/de/product/flexo-wrap/?$                 /flexo-wrap;
    ~^/es/product/flexo-wrap/?$                 /flexo-wrap;

    # SKU: GWN - Grip Wrap
    ~^/product/grip-wrap/?$                     /grip-wrap;
    ~^/en/product/grip-wrap/?$                  /grip-wrap;
    ~^/de/product/grip-wrap/?$                  /grip-wrap;
    ~^/es/product/grip-wrap/?$                  /grip-wrap;

    # SKU: F6W - F6 Woven Wrap
    ~^/product/f6-woven-wrap/?$                 /f6-woven-wrap;
    ~^/en/product/f6-woven-wrap/?$              /f6-woven-wrap;
    ~^/de/product/f6-woven-wrap/?$              /f6-woven-wrap;
    ~^/es/product/f6-woven-wrap/?$              /f6-woven-wrap;
}

# --- CATEGORY REDIRECTS (5 categories × 4 languages = 20 rules) ---

map $request_uri $wc_category_redirect {
    default "";

    # Category: Algemeen / General Purpose
    ~^/product-categorie/algemeen/?$            /algemeen;
    ~^/en/product-categorie/general-purpose/?$  /general-purpose;
    ~^/de/product-categorie/universeller-einsatz/?$  /algemeen;       # NOTE: M2 DE store has Dutch slug
    ~^/es/product-categorie/uso-general-es/?$   /algemeen;            # NOTE: M2 ES store has Dutch slug

    # Category: Heavy Duty
    ~^/product-categorie/heavy-duty/?$          /heavy-duty;
    ~^/en/product-categorie/heavy-duty-en/?$    /heavy-duty;
    ~^/de/product-categorie/schlauchschutz/?$   /heavy-duty;          # NOTE: M2 DE store has NL slug
    ~^/es/product-categorie/tarea-pesada-es/?$  /heavy-duty;          # NOTE: M2 ES store has NL slug

    # Category: Metaal & Afscherming / Metal & Shielding
    ~^/product-categorie/metaal-afscherming/?$        /metaal-amp-afscherming;  # NOTE: M2 has HTML-encoded "&"
    ~^/en/product-categorie/metal-shielding/?$        /metal-and-shielding;
    ~^/de/product-categorie/metall-abschirmung/?$     /metaal-amp-afscherming;  # NOTE: M2 DE has NL slug
    ~^/es/product-categorie/metal-y-blindaje-es/?$    /metaal-amp-afscherming;  # NOTE: M2 ES has NL slug

    # Category: Geavanceerd / Advanced Engineering
    ~^/product-categorie/geavanceerd/?$         /geavanceerd;
    ~^/en/product-categorie/advanced-engineering/?$  /advanced-engineering;
    ~^/de/product-categorie/hochentwickelt-de/?$     /geavanceerd;    # NOTE: M2 DE has NL slug
    ~^/es/product-categorie/ingenieria-avanzada-es/?$ /geavanceerd;   # NOTE: M2 ES has NL slug

    # Category: Hoge Temperatuur / High Temperature
    ~^/product-categorie/hoge-temperatuur/?$    /hoge-temperatuur;
    ~^/en/product-categorie/high-temperature/?$ /high-temperature;
    ~^/de/product-categorie/hohe-temperatur/?$  /hoge-temperatuur;    # NOTE: M2 DE has NL slug
    ~^/es/product-categorie/alta-temperatura-es/?$  /hoge-temperatuur; # NOTE: M2 ES has NL slug
}


# Altcha PoW captcha – Lua-based proxy to the loopback sidecar (altcha-pow :8001)
# Matches the production API from ansible/remote/roles/docker_nginx
#
# Endpoints (include captcha.conf snippet in any server block):
#   GET  /.pow/challenge.json  → challenge from sidecar
#   POST /.pow/verify          → verify {payload: "base64..."}, returns {ok: true}
#
# Internal server block for Docker inter-container traffic (http://nginx/.pow/...)

upstream altcha_pow {
    server 127.0.0.1:8001;
    keepalive 4;
}

server {
    listen 80;
    server_name nginx;

    include /usr/local/openresty/nginx/conf/sites-available/captcha.conf;

    location / {
        return 404;
    }
}

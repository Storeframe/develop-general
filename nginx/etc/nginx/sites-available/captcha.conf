# Altcha PoW captcha endpoints – include in any server block
# Mirrors the production API from ansible docker_nginx role
# Usage: include /usr/local/openresty/nginx/conf/sites-available/captcha.conf;

# GET /.pow/challenge.json – fetch a challenge from the sidecar
location = /.pow/challenge.json {
    default_type application/json;
    content_by_lua_block {
        local http = require "resty.http"
        local httpc = http.new()
        httpc:set_timeout(200)

        local uri = "http://127.0.0.1:8001/challenge"
        if ngx.var.args then
            uri = uri .. "?" .. ngx.var.args
        end

        local res, err = httpc:request_uri(uri)
        if not res then
            ngx.log(ngx.ERR, "[PoW] sidecar connect failed: ", err)
            ngx.status = 503
            ngx.say('{"error":"unavailable"}')
            return ngx.exit(503)
        end
        if res.status ~= 200 or not res.body or res.body == "" then
            ngx.status = 503
            ngx.say('{"error":"invalid"}')
            return ngx.exit(503)
        end

        ngx.header["Cache-Control"] = "no-store"
        ngx.print(res.body)
    }
}

# POST /.pow/verify – verify a solution payload
# Expects JSON: {"payload": "base64-encoded-solution"}
# Returns: {"ok": true} or error
location = /.pow/verify {
    default_type application/json;
    content_by_lua_block {
        local http = require "resty.http"
        local cjson = require "cjson.safe"

        if ngx.req.get_method() ~= "POST" then
            ngx.status = 405
            ngx.say('{"error":"method_not_allowed"}')
            return ngx.exit(405)
        end

        ngx.req.read_body()
        local body = ngx.req.get_body_data()
        if not body then
            ngx.status = 400
            ngx.say('{"error":"no_body"}')
            return ngx.exit(400)
        end

        local req_data = cjson.decode(body)
        if not req_data or not req_data.payload then
            ngx.status = 400
            ngx.say('{"error":"missing_payload"}')
            return ngx.exit(400)
        end

        local httpc = http.new()
        httpc:set_timeout(500)

        local res, err = httpc:request_uri("http://127.0.0.1:8001/verify", {
            method = "POST",
            body = req_data.payload,
            headers = { ["Content-Type"] = "text/plain" },
        })

        if not res then
            ngx.log(ngx.ERR, "[PoW] sidecar verify failed: ", err)
            ngx.status = 503
            ngx.say('{"error":"temporarily_unavailable"}')
            return ngx.exit(503)
        end

        local result = cjson.decode(res.body)
        if not result or not result.valid then
            ngx.status = 403
            ngx.say('{"error":"invalid_solution"}')
            return ngx.exit(403)
        end

        ngx.header["Cache-Control"] = "no-store"
        ngx.say('{"ok":true}')
    }
}
